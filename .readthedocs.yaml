version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
    rust: "latest"
  jobs:
    post_create_environment:
      - "$READTHEDOCS_VIRTUALENV_PATH/bin/pip install maturin sphinx sphinx-rtd-theme sphinx-autodoc-typehints myst-nb plotly furo"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

python:
  install:
    - method: pip
      path: .
